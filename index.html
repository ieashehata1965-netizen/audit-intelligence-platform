<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audit Intelligence Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

<header class="main-header">
    Audit Intelligence Platform
</header>

<div class="container">

    <h2>Dashboard</h2>

    <button onclick="openModal()">Create Audit Report</button>
    

    <div class="dashboard">

    <div class="card">
        <h3>Audit Reports</h3>
        <p id="totalReports">0 Reports</p>
    </div>

    <div class="card">
        <h3>Open Risks</h3>
        <p>5 Risks</p>
    </div>

    <div class="card">
        <h3>Pending Reviews</h3>
        <p>3 Items</p>
    </div>

</div>

   <input
    type="text"
    id="searchReport"
    placeholder="Search by Audit Number, Title, Department..."
    onkeyup="updateDashboard()"
    style="width:50%;max-width:600px;min-width:300px;padding:10px;margin:0 auto 10px auto;border-radius:6px;display:block;"
>
<div id="reportsList"></div>

</div>
    

<!-- 🔴 هنا مباشرة ضع Modal -->

<div id="auditModal" class="modal">
  <div class="modal-content">

<h2>إنشاء تقرير تدقيق | Create Audit Report</h2>

<input type="text" id="auditNumber" dir="ltr" placeholder="Audit Number | رقم التدقيق">

<input type="text" id="auditTitle" dir="ltr" placeholder="Audit Title | عنوان التدقيق">

<input type="text" id="auditDepartment" dir="ltr" placeholder="Department / Entity | الإدارة / الجهة">

<input type="text" id="auditPeriod" dir="ltr" placeholder="Audit Period | فترة التدقيق">

<input type="text" id="auditor" dir="ltr" placeholder="Auditor | المدقق">

<input type="text" id="reviewer" dir="ltr" placeholder="Reviewer | المراجع">

<input type="date" id="reportDate">

<textarea id="auditObjective" dir="ltr" placeholder="Audit Objective | هدف التدقيق"></textarea>

<textarea id="auditScope" dir="ltr" placeholder="Audit Scope | نطاق التدقيق"></textarea>

<hr>
      
<h3>Observation Details | تفاصيل الملاحظة</h3>

<input type="text" id="observationNumber" dir="ltr" placeholder="Observation Number | رقم الملاحظة">

<textarea id="controlObjective" dir="ltr" placeholder="Control Objective | هدف الرقابة"></textarea>
      
<select id="criteria">
  <option value="">Select Criteria | اختر المعيار</option>
  <option>IIA Standards</option>
  <option>IPPF</option>
  <option>COSO</option>
  <option>ISO 9001</option>
  <option>ISO 45001</option>
  <option>Company Policy</option>
  <option>Procedure Manual</option>
  <option>Contract Requirement</option>
  <option>Saudi Law</option>
</select>
      
<textarea id="condition" dir="ltr" placeholder="Condition / Observation | الملاحظة"></textarea>

<textarea id="rootCause" dir="ltr" placeholder="Root Cause | السبب الجذري"></textarea>

<textarea id="impact" dir="ltr" placeholder="Impact / Consequence | الأثر / النتيجة"></textarea>

<textarea id="recommendation" dir="ltr" placeholder="Recommendation | التوصية"></textarea>
      
<select id="riskType">
  <option value="">Risk Type</option>
  <option>Strategic</option>
  <option>Financial</option>
  <option>Operational</option>
  <option>Compliance</option>
  <option>Fraud</option>
  <option>IT</option>
</select>

<select id="likelihood">
  <option value="">Likelihood | احتمالية الحدوث</option>
  <option>High</option>
  <option>Medium</option>
  <option>Low</option>
</select>

<select id="impactRating">
  <option value="">Impact Rating | درجة الأثر</option>
  <option>High</option>
  <option>Medium</option>
  <option>Low</option>
</select>
      
<select id="riskRating">
  <option value="">Risk Rating | درجة المخاطر</option>
  <option>Critical</option>
  <option>High</option>
  <option>Medium</option>
  <option>Low</option>
</select>
      
<textarea id="managementResponse" dir="ltr" placeholder="Management Response | رد الإدارة"></textarea>

<input type="text" id="responsiblePerson" dir="ltr" placeholder="Responsible Person | الشخص المسؤول">

<input type="date" id="targetDate">

<select id="status">
  <option value="">Status | الحالة</option>
  <option>Open</option>
  <option>In Progress</option>
  <option>Closed</option>
  <option>Overdue</option>
</select>
      
<input type="text" id="workingPaper" dir="ltr" placeholder="Working Paper Reference | مرجع ورقة العمل">

<textarea id="overallConclusion" dir="ltr" placeholder="Overall Conclusion | الخلاصة العامة"></textarea>

<div class="action-buttons">

<button onclick="closeModal()">
  Cancel
</button>

<button id="saveReportBtn" onclick="saveAuditReport()">
  Save Report
</button>

</div>
  </div>
</div>

<div id="reportViewer" class="modal">
  <div class="modal-content">

    <h2>Audit Report</h2>

<button onclick="printReport()" style="margin-bottom:10px;">
    Print Report
</button>

<button onclick="editReport()" style="margin-bottom:10px;">
    Edit Report
</button>

<div id="reportContent"></div>

<div class="action-buttons">
    <button onclick="closeReportViewer()">Close</button>
</div>
  </div>
</div>
    <script>
function openModal(){
    const modal = document.getElementById("auditModal");

    // تأكد من فتح نموذج إنشاء جديد (ليس تعديل)
    window.editingReportId = null;
    document.getElementById('saveReportBtn').innerText = 'Save Report';

    // قائمة الحقول المراد مسحها أو إعادة تعيينها
    const fields = [
      'auditNumber','auditTitle','auditDepartment','auditPeriod','auditor','reviewer','reportDate',
      'auditObjective','auditScope','observationNumber','controlObjective','criteria','condition',
      'rootCause','impact','recommendation','riskType','likelihood','impactRating','riskRating',
      'managementResponse','responsiblePerson','targetDate','status','workingPaper','overallConclusion'
    ];

    fields.forEach(id => {
      const el = document.getElementById(id);
      if(!el) return;
      const tag = el.tagName.toLowerCase();
      if(tag === 'select'){
        el.selectedIndex = 0;
      } else if(tag === 'textarea' || tag === 'input'){
        // للـ input تأكد من نوعه
        if(el.type === 'checkbox' || el.type === 'radio'){
          el.checked = false;
        } else {
          el.value = '';
        }
      }
    });

    // افتح المودال
    modal.style.display = "block";
}
    

function closeModal(){
    const modal = document.getElementById("auditModal");
    modal.style.display = "none";
    // reset editing flag when closing without saving
    window.editingReportId = null;
    document.getElementById('saveReportBtn').innerText = 'Save Report';
    // Optionally clear fields
}
    function saveAuditReport(){

    // Load existing reports
let reports = JSON.parse(localStorage.getItem("auditReports")) || [];

    // 1. جلب القيم من الحقول
const auditNumber = document.getElementById("auditNumber").value;
const auditPeriod = document.getElementById("auditPeriod").value;
const auditor = document.getElementById("auditor").value;
const reviewer = document.getElementById("reviewer").value;
const reportDate = document.getElementById("reportDate").value;
const auditObjective = document.getElementById("auditObjective").value;
const title = document.getElementById("auditTitle").value;
const department = document.getElementById("auditDepartment").value;
const scope = document.getElementById("auditScope").value;

// NOTE: use 'condition' field as the observation
const observation = document.getElementById("condition")?.value || "";
const rootCause = document.getElementById("rootCause")?.value || "";
const impact = document.getElementById("impact")?.value || "";
const recommendation = document.getElementById("recommendation")?.value || "";
const observationNumber = document.getElementById("observationNumber").value;
const controlObjective = document.getElementById("controlObjective").value;
const criteria = document.getElementById("criteria").value;

const riskType = document.getElementById("riskType").value;
const likelihood = document.getElementById("likelihood").value;
const impactRating = document.getElementById("impactRating").value;
const riskRating = document.getElementById("riskRating").value;

const managementResponse = document.getElementById("managementResponse").value;
const responsiblePerson = document.getElementById("responsiblePerson").value;
const targetDate = document.getElementById("targetDate").value;
const statusField = document.getElementById("status").value;
const workingPaper = document.getElementById("workingPaper").value;
const overallConclusion = document.getElementById("overallConclusion").value;        

    // Determine if we are editing an existing report or creating a new one
    const isEditing = !!window.editingReportId;
    let createdAt = new Date().toISOString();
    let reportId = "AR-" + Date.now();

    if(isEditing){
        // find existing report to preserve createdAt and id
        const idx = reports.findIndex(r => r.id === window.editingReportId);
        if(idx !== -1){
            createdAt = reports[idx].createdAt || createdAt;
            reportId = reports[idx].id || window.editingReportId;
        }
    }

    // 2. إنشاء كائن التقرير
   const report = {
    id: reportId,

    auditNumber,
    title,
    department,
    auditPeriod,
    auditor,
    reviewer,
    reportDate,
    auditObjective,
    scope,

    observationNumber,
    controlObjective,
    criteria,
    observation,
    rootCause,
    impact,
    recommendation,

    riskType,
    likelihood,
    impactRating,
    riskRating,

    managementResponse,
    responsiblePerson,
    targetDate,
    workingPaper,
    overallConclusion,

    status: statusField || "Draft",

    createdAt: createdAt
};       
        
// Add or update report
if(isEditing){
    const idx = reports.findIndex(r => r.id === window.editingReportId);
    if(idx !== -1){
        reports[idx] = report;
    } else {
        reports.push(report);
    }
} else {
    reports.push(report);
}

// Save back
localStorage.setItem("auditReports", JSON.stringify(reports));
    // 6. تنبيه بسيط
    alert(isEditing ? "Report Updated Successfully" : "Report Saved Successfully");

    // reset editing flag
    window.editingReportId = null;
    document.getElementById('saveReportBtn').innerText = 'Save Report';

    // 7. إغلاق المودال
    closeModal();

    // تحديث الداشبورد مباشرة بعد الحفظ
    updateDashboard();
}

function updateDashboard(){

    let reports = JSON.parse(localStorage.getItem("auditReports")) || [];
// البحث
let search = document.getElementById("searchReport")?.value.toLowerCase() || "";

reports = reports.filter(r =>
    (r.auditNumber || "").toLowerCase().includes(search) ||
    (r.title || "").toLowerCase().includes(search) ||
    (r.department || "").toLowerCase().includes(search)
);
    
    // 1. إجمالي التقارير (KPI)
    document.getElementById("totalReports").innerText = reports.length + " Reports";

    // 2. معالجة حالة عدم وجود بيانات
    if(reports.length === 0){
        document.getElementById("reportsList").innerHTML =
            "<div class='empty-state'>No Audit Reports Found</div>";
        return;
    }

    // 3. أخذ آخر 5 تقارير فقط (Control of Display Load)
    let visibleReports = reports;

   // 4. بناء المحتوى
let html = "";

visibleReports.forEach(function(r){

    html += `
    <div class="report-card" onclick="viewReport('${r.id}')">

        <div style="display:flex;justify-content:space-between;align-items:center;width:100%;">

            <div class="report-title">
                ${r.title || "Untitled Report"}
            </div>

            <button
    title="Delete Report"
    onclick="event.stopPropagation(); deleteReport('${r.id}')"
    style="background:#dc3545;color:white;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:16px;">
    🗑️
</button>

        </div>

        <div class="report-meta">
    Department: ${r.department || "N/A"} <br>
    ID: ${r.id || "N/A"} <br>
    Date: ${r.reportDate || "N/A"}
</div>

        <div class="report-status status-${r.status}">
            ${r.status || "Unknown"}
        </div>

    </div>
    `;
});
    
    // 5. العرض النهائي
    document.getElementById("reportsList").innerHTML = html;
}
    function viewReport(id){

    let reports = JSON.parse(localStorage.getItem("auditReports")) || [];
    let report = reports.find(r => r.id == id);
    window.currentReportId = id;
    if(!report){
        alert("Report Not Found");
        return;
    }

    document.getElementById("reportContent").innerHTML = `
<div style="direction:ltr; font-family:Arial; line-height:1.8">

<!-- HEADER -->
<div style="text-align:center; margin-bottom:20px;">
    <h2 style="margin:0;color:#003366;">
        Internal Audit Report | تقرير التدقيق الداخلي
    </h2>
    <h3 style="margin:8px 0;">
        ${report.title || ""}
    </h3>
</div>

<!-- BASIC INFO -->
<table style="width:100%; border-collapse:collapse; margin-bottom:20px;" border="1" cellpadding="8">

<tr>

<td style="width:25%; direction:ltr; text-align:left;">
        <b>Audit No. | رقم التدقيق</b>
    </td>

    <td style="width:17%; direction:ltr; text-align:left;">
        ${report.auditNumber || ""}
    </td>

    <td style="width:23%; direction:ltr; text-align:left;">
        <b>Department | الإدارة</b>
    </td>

    <td style="width:35%; direction:ltr; text-align:left;">
        ${report.department || ""}
    </td>

</tr>

<tr>

    <td style="direction:ltr; text-align:left;">
        <b>Status | الحالة</b>
    </td>

    <td style="direction:ltr; text-align:left;">
        ${report.status || ""}
    </td>

    <td style="direction:ltr; text-align:left;">
        <b>Date | التاريخ</b>
    </td>

    <td style="direction:ltr; text-align:left;">
        ${report.reportDate || ""}
    </td>

</tr>

</table>

<!-- OBSERVATION -->
<h3 style="background:#003366;color:white;padding:8px;text-align:center;">
Observation Details | تفاصيل الملاحظة
</h3>

<table style="width:100%; border-collapse:collapse;" border="1" cellpadding="8">

<tr>
    <td width="25%" style="direction:ltr; text-align:left;">
        <b>Observation | الملاحظة</b>
    </td>
    <td style="direction:ltr; text-align:left;">
        ${report.observation || ""}
    </td>
</tr>

<tr>
    <td style="direction:ltr; text-align:left;">
        <b>Root Cause | السبب الجذري</b>
    </td>
    <td style="direction:ltr; text-align:left;">
        ${report.rootCause || ""}
    </td>
</tr>

<tr>
    <td style="direction:ltr; text-align:left;">
        <b>Recommendation | التوصية</b>
    </td>
    <td style="direction:ltr; text-align:left;">
        ${report.recommendation || ""}
    </td>
</tr>

<tr>
    <td style="direction:ltr; text-align:left;">
        <b>Overall Conclusion | الخلاصة</b>
    </td>
    <td style="direction:ltr; text-align:left;">
        ${report.overallConclusion || ""}
    </td>
</tr>

</table>

<hr>

<!-- RISK -->
<table style="width:100%; border-collapse:collapse; margin-top:10px;" border="1" cellpadding="8">

<tr>
    <td width="25%" style="direction:ltr; text-align:left;">
        <b>Risk Rating | درجة المخاطر</b>
    </td>

    <td style="direction:ltr; text-align:left;">
        ${report.riskRating || ""}
    </td>
</tr>

<tr>
    <td style="direction:ltr; text-align:left;">
        <b>Status | الحالة</b>
    </td>

    <td style="direction:ltr; text-align:left;">
        ${report.status || "Draft"}
    </td>
</tr>

</table>

</div>
`;

document.getElementById("reportViewer").style.display = "block";
}
    
// PRINT REPORT
function printReport() {

    const reportHTML = document.getElementById("reportContent").innerHTML;

    const printWindow = window.open("", "_blank", "width=900,height=700");

    if (!printWindow) {
        alert("Popup blocked");
        return;
    }

    printWindow.document.write(`
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audit Report</title>

<style>

body{
    font-family: Tahoma, Arial, sans-serif;
    margin:5mm;
    direction:ltr;
    text-align:left;
    background:#fff;
    zoom:1;
}

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

td, th{
    border:1px solid #000;
    padding:8px;
    direction:ltr;
    text-align:left;
    vertical-align:top;
    word-wrap:break-word;
    overflow-wrap:break-word;
}

h2,h3{
    text-align:center;
    margin:8px 0;
}

@page{
    size:A4;
    margin:10mm;
}

</style>

</head>

<body>

${reportHTML}

</body>
</html>
`);

       printWindow.document.close();

    printWindow.onload = function () {
        printWindow.focus();
        printWindow.print();
        setTimeout(() => {
    printWindow.close();
}, 500);
    };
    }
        
       function editReport(){

    closeReportViewer();
    openModal();
    let reports = JSON.parse(localStorage.getItem("auditReports")) || [];
let report = reports.find(r => r.id == window.currentReportId);
if(!report){
    alert('Report Not Found');
    return;
}

// set editing flag so save will update existing report
window.editingReportId = report.id;
// populate modal fields with report data
document.getElementById('auditNumber').value = report.auditNumber || '';
document.getElementById('auditTitle').value = report.title || '';
document.getElementById('auditDepartment').value = report.department || '';
document.getElementById('auditPeriod').value = report.auditPeriod || '';
document.getElementById('auditor').value = report.auditor || '';
document.getElementById('reviewer').value = report.reviewer || '';
document.getElementById('reportDate').value = report.reportDate || '';
document.getElementById('auditObjective').value = report.auditObjective || '';
document.getElementById('auditScope').value = report.scope || '';

document.getElementById('observationNumber').value = report.observationNumber || '';
document.getElementById('controlObjective').value = report.controlObjective || '';
document.getElementById('criteria').value = report.criteria || '';
// observation maps to textarea id 'condition'
document.getElementById('condition').value = report.observation || '';

document.getElementById('rootCause').value = report.rootCause || '';
document.getElementById('impact').value = report.impact || '';
document.getElementById('recommendation').value = report.recommendation || '';

document.getElementById('riskType').value = report.riskType || '';
document.getElementById('likelihood').value = report.likelihood || '';
document.getElementById('impactRating').value = report.impactRating || '';
document.getElementById('riskRating').value = report.riskRating || '';

document.getElementById('managementResponse').value = report.managementResponse || '';
document.getElementById('responsiblePerson').value = report.responsiblePerson || '';
document.getElementById('targetDate').value = report.targetDate || '';
document.getElementById('status').value = report.status || '';
document.getElementById('workingPaper').value = report.workingPaper || '';
document.getElementById('overallConclusion').value = report.overallConclusion || '';

// change save button text
document.getElementById('saveReportBtn').innerText = 'Update Report';
}

function closeReportViewer(){
    document.getElementById("reportViewer").style.display = "none";
}
        
// initialize dashboard on load
window.onload = function(){
    updateDashboard();
};
</script>

</body>
</html>
