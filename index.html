<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audit Intelligence Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

<header class="main-header">
    Audit Intelligence Platform
</header>

<div class="container">

    <h2>Dashboard</h2>

    <button onclick="openModal()">Create Audit Report</button>
    

    <div class="dashboard">

    <div class="card">
        <h3>Audit Reports</h3>
        <p id="totalReports">0 Reports</p>
    </div>

    <div class="card">
        <h3>Open Risks</h3>
        <p>5 Risks</p>
    </div>

    <div class="card">
        <h3>Pending Reviews</h3>
        <p>3 Items</p>
    </div>

</div>

   <input
    type="text"
    id="searchReport"
    placeholder="Search by Audit Number, Title, Department..."
    onkeyup="updateDashboard()"
    style="width:50%;max-width:600px;min-width:300px;padding:10px;margin:0 auto 10px auto;border-radius:6px;display:block;"
>
<div id="reportsList"></div>

</div>
    

<!-- 🔴 هنا مباشرة ضع Modal -->

<div id="auditModal" class="modal">
  <div class="modal-content">

    <h2>Create Audit Report</h2>

<input type="text" id="auditNumber" placeholder="Audit Number">

<input type="text" id="auditTitle" placeholder="Audit Title">

<input type="text" id="auditDepartment" placeholder="Department / Entity">

<input type="text" id="auditPeriod" placeholder="Audit Period">

<input type="text" id="auditor" placeholder="Auditor">

<input type="text" id="reviewer" placeholder="Reviewer">

<input type="date" id="reportDate">

<textarea id="auditObjective" placeholder="Audit Objective"></textarea>

<textarea id="auditScope" placeholder="Audit Scope"></textarea>

<hr>

<h3>Observation Details</h3>

<input type="text" id="observationNumber" placeholder="Observation Number">

<textarea id="controlObjective" placeholder="Control Objective"></textarea>

<select id="criteria">
  <option value="">Select Criteria</option>
  <option>IIA Standards</option>
  <option>IPPF</option>
  <option>COSO</option>
  <option>ISO 9001</option>
  <option>ISO 45001</option>
  <option>Company Policy</option>
  <option>Procedure Manual</option>
  <option>Contract Requirement</option>
  <option>Saudi Law</option>
</select>

<textarea id="observation" placeholder="Condition / Observation"></textarea>

<textarea id="rootCause" placeholder="Root Cause"></textarea>

<textarea id="impact" placeholder="Impact / Consequence"></textarea>

<textarea id="recommendation" placeholder="Recommendation"></textarea>

<select id="riskType">
  <option value="">Risk Type</option>
  <option>Strategic</option>
  <option>Financial</option>
  <option>Operational</option>
  <option>Compliance</option>
  <option>Fraud</option>
  <option>IT</option>
</select>

<select id="likelihood">
  <option value="">Likelihood</option>
  <option>High</option>
  <option>Medium</option>
  <option>Low</option>
</select>

<select id="impactRating">
  <option value="">Impact Rating</option>
  <option>High</option>
  <option>Medium</option>
  <option>Low</option>
</select>

<select id="riskRating">
  <option value="">Risk Rating</option>
  <option>Critical</option>
  <option>High</option>
  <option>Medium</option>
  <option>Low</option>
</select>

<textarea id="managementResponse" placeholder="Management Response"></textarea>

<input type="text" id="responsiblePerson" placeholder="Responsible Person">

<input type="date" id="targetDate">

<select id="status">
  <option value="">Status</option>
  <option>Open</option>
  <option>In Progress</option>
  <option>Closed</option>
  <option>Overdue</option>
</select>

<input type="text" id="workingPaper" placeholder="Working Paper Reference">

<textarea id="overallConclusion" placeholder="Overall Conclusion"></textarea>

<div class="action-buttons">

<button onclick="closeModal()">
  Cancel
</button>

<button onclick="saveAuditReport()">
  Save Report
</button>

</div>
  </div>
</div>
<div id="reportViewer" class="modal">
  <div class="modal-content">

    <h2>Audit Report</h2>

<button onclick="window.print()" style="margin-bottom:10px;">
Print Report
</button>

<div id="reportContent"></div>
    
    <div class="action-buttons">
      <button onclick="closeReportViewer()">Close</button>
    </div>

  </div>
</div>    
<script>
function openModal(){
    const modal = document.getElementById("auditModal");

    console.log(modal); // للتأكد

    modal.style.display = "block";
}
    

function closeModal(){
    const modal = document.getElementById("auditModal");
    modal.style.display = "none";
}

    function saveAuditReport(){

    // 1. جلب القيم من الحقول
const auditNumber = document.getElementById("auditNumber").value;
const auditPeriod = document.getElementById("auditPeriod").value;
const auditor = document.getElementById("auditor").value;
const reviewer = document.getElementById("reviewer").value;
const reportDate = document.getElementById("reportDate").value;
const auditObjective = document.getElementById("auditObjective").value;
const title = document.getElementById("auditTitle").value;
const department = document.getElementById("auditDepartment").value;
const scope = document.getElementById("auditScope").value;

const observation = document.getElementById("observation").value;
const rootCause = document.getElementById("rootCause").value;
const impact = document.getElementById("impact").value;
const recommendation = document.getElementById("recommendation").value;
const observationNumber = document.getElementById("observationNumber").value;
const controlObjective = document.getElementById("controlObjective").value;
const criteria = document.getElementById("criteria").value;

const riskType = document.getElementById("riskType").value;
const likelihood = document.getElementById("likelihood").value;
const impactRating = document.getElementById("impactRating").value;
const riskRating = document.getElementById("riskRating").value;

const managementResponse = document.getElementById("managementResponse").value;
const responsiblePerson = document.getElementById("responsiblePerson").value;
const targetDate = document.getElementById("targetDate").value;
const statusField = document.getElementById("status").value;
const workingPaper = document.getElementById("workingPaper").value;
const overallConclusion = document.getElementById("overallConclusion").value;        

    // 2. إنشاء كائن التقرير
   const report = {
    id: "AR-" + Date.now(),

    auditNumber,
    title,
    department,
    auditPeriod,
    auditor,
    reviewer,
    reportDate,
    auditObjective,
    scope,

    observationNumber,
    controlObjective,
    criteria,
    observation,
    rootCause,
    impact,
    recommendation,

    riskType,
    likelihood,
    impactRating,
    riskRating,

    managementResponse,
    responsiblePerson,
    targetDate,
    workingPaper,
    overallConclusion,

    status: statusField || "Draft",

    createdAt: new Date().toISOString()
};       
        
        
        
    // 4. إضافة التقرير الجديد
    reports.push(report);

    // 5. حفظ مرة أخرى
    localStorage.setItem("auditReports", JSON.stringify(reports));

    // 6. تنبيه بسيط
    alert("Report Saved Successfully");

    // 7. إغلاق المودال
    closeModal();

    // تحديث الداشبورد مباشرة بعد الحفظ
    updateDashboard();
}

function updateDashboard(){

    let reports = JSON.parse(localStorage.getItem("auditReports")) || [];
// البحث
let search = document.getElementById("searchReport")?.value.toLowerCase() || "";

reports = reports.filter(r =>
    (r.auditNumber || "").toLowerCase().includes(search) ||
    (r.title || "").toLowerCase().includes(search) ||
    (r.department || "").toLowerCase().includes(search)
);
    
    // 1. إجمالي التقارير (KPI)
    document.getElementById("totalReports").innerText = reports.length + " Reports";

    // 2. معالجة حالة عدم وجود بيانات
    if(reports.length === 0){
        document.getElementById("reportsList").innerHTML =
            "<div class='empty-state'>No Audit Reports Found</div>";
        return;
    }

    // 3. أخذ آخر 5 تقارير فقط (Control of Display Load)
    let visibleReports = reports;

    // 4. بناء المحتوى
    let html = "";

    visibleReports.forEach(function(r){

        html += `
        <div class="report-card" onclick="viewReport('${r.id}')">

            <div class="report-title">
                ${r.title || "Untitled Report"}
            </div>

            <div class="report-meta">
                Department: ${r.department || "N/A"} <br>
                ID: ${r.id || "N/A"}
            </div>

            <div class="report-status status-${r.status}">
                ${r.status || "Unknown"}
            </div>

        </div>
        `;
    });

    // 5. العرض النهائي
    document.getElementById("reportsList").innerHTML = html;
}
    function viewReport(id){

    let reports = JSON.parse(localStorage.getItem("auditReports")) || [];

    let report = reports.find(r => r.id == id);

    if(!report){
        alert("Report Not Found");
        return;
    }

    document.getElementById("reportContent").innerHTML = `
<div style="text-align:right; line-height:1.8; font-family:Arial">

<div style="text-align:center; margin-bottom:20px;">
    <h2 style="margin:0;color:#003366;">Internal Audit Report</h2>
    <h3 style="margin:8px 0;">${report.title || ""}</h3>
</div>

<table style="width:100%;border-collapse:collapse;margin-bottom:20px;direction:ltr;text-align:left;" border="1" cellpadding="8">
<tr>
    <td><b>Audit No.</b></td>
    <td>${report.auditNumber || ""}</td>

    <td><b>Department</b></td>
    <td>${report.department || ""}</td>
</tr>

<tr>
    <td><b>Status</b></td>
    <td>${report.status || ""}</td>

    <td><b>Date</b></td>
    <td>${report.reportDate || ""}</td>
</tr>
</table>
<h3 style="background:#003366;color:white;padding:8px;text-align:center;">
Observation Details
</h3>

<table style="width:100%;border-collapse:collapse;direction:ltr;text-align:left;" border="1" cellpadding="8">

<tr>
<td width="25%"><b>Observation</b></td>
<td>${report.observation || ""}</td>
</tr>

<tr>
<td><b>Root Cause</b></td>
<td>${report.rootCause || ""}</td>
</tr>

<tr>
<td><b>Recommendation</b></td>
<td>${report.recommendation || ""}</td>
</tr>

</table>

<hr>

<h3 style="background:#003366;color:white;padding:8px;text-align:center;">
Risk Assessment
</h3>

<table style="width:100%;border-collapse:collapse;direction:ltr;text-align:left;" border="1" cellpadding="8">

<tr>
<td width="25%"><b>Risk Rating</b></td>
<td>${report.riskRating || ""}</td>
</tr>

<tr>
<td><b>Status</b></td>
<td>${report.status || ""}</td>
</tr>

</table>

</div>
`;

document.getElementById("reportViewer").style.display = "block";
}
    
    function closeReportViewer(){
    document.getElementById("reportViewer").style.display = "none";
}
</script>

</body>
</html>
