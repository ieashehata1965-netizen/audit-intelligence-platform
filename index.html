<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audit Intelligence Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

<header class="main-header">
    Audit Intelligence Platform
</header>

<div class="container">

    <h2>Dashboard</h2>

    <button onclick="openModal()">Create Audit Report</button>
    

    <div class="dashboard">

        <div class="card">
            <h3>Audit Reports</h3>
            <p>12 Reports</p>
        </div>

        <div class="card">
            <h3>Open Risks</h3>
            <p>5 Risks</p>
        </div>

        <div class="card">
            <h3>Pending Reviews</h3>
            <p>3 Items</p>
        </div>

    </div>

</div>

<!-- 🔴 هنا مباشرة ضع Modal -->

<div id="auditModal" class="modal">
  <div class="modal-content">

    <h2>Create Audit Report</h2>

    <input type="text" placeholder="Audit Title">
    <input type="text" placeholder="Department / Entity">
    <textarea placeholder="Audit Scope"></textarea>

    <button onclick="openModal()">
Create Audit Report
</button>
      

  </div>
</div>

<script>
function openModal(){
    const modal = document.getElementById("auditModal");

    console.log(modal); // للتأكد

    modal.style.display = "block";
}

function closeModal(){
    const modal = document.getElementById("auditModal");
    modal.style.display = "none";
}
</script>
    

</body>
</html>
